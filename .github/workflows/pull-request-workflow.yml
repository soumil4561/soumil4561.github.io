name: continuous-integration

on:
  pull-request:
    branches:
      - some-imaginary-branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          clean: true
          show-progress: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Check lint
        run: npm run lint

      - name: Run test
        run: npm run test:ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_CONTACT_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_CONTACT_TEMPLATE_ID }}
          NEXT_PUBLIC_TURNSTILE_SITEKEY: ${{secrets.NEXT_PUBLIC_TURNSTILE_SITEKEY}}
          NEXT_PUBLIC_EMAIL_PROXY_HOST: ${{secrets.NEXT_PUBLIC_EMAIL_PROXY_HOST}}
          NODE_ENV: ${{env.NODE_ENV}}